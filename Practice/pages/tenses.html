<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generador de Persona y Verbos</title>
  <link rel="stylesheet" href="../styles/description.css" />
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 32px;
      background: #f5f5f5;
      line-height: 1.6;
    }
    #main-person {
      background: white;
      border-radius: 12px;
      padding: 24px;
      margin: 0 auto 28px auto;
      max-width: 960px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      text-align: left;
    }
    #verb-section {
      margin: 20px auto;
      display: flex;
      justify-content: center;
      gap: 15px;
      align-items: center;
    }
    #verb-section img {
      width: 240px;
      height: 240px;
      object-fit: contain;
      border-radius: 10px;
      background: white;
      box-shadow: 0 1px 5px rgba(0,0,0,0.2);
    }
    #extra-persons {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 28px;
      margin-top: 32px;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      width: 360px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      text-align: left;
    }
    button {
      margin-top: 25px;
      padding: 10px 20px;
      background-color: #3498db;
      border: none;
      color: white;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
    }
    button:hover {
      background-color: #2980b9;
    }
  </style>
</head>
<body>
  <h1>Generador de Persona + Verbos</h1>

  <!-- Persona principal -->
  <div id="main-person"></div>

  <!-- Verbos e imágenes -->
  <div id="verb-section">
    <img id="img1" src="" alt="Pronoun">
    <img id="img2" src="" alt="Verb">
    <img id="img3" src="" alt="YN">
  </div>
  <p id="tense"></p>

  <!-- Personas extra -->
  <div id="extra-persons"></div>

  <button id="generar">Generar</button>

  <!-- Scripts -->
  <script type="module">
    import { generatePerson } from "../scripts/description/generatePerson.js";
    // NOTA: ya no importamos displayRandomImages; definimos las funciones aquí.

    /* -------------------------
       Helpers para los verbos
       ------------------------- */
    function getRandomElement(array){
      return array[Math.floor(Math.random() * array.length)];
    }

    function getRandomImage(folder, count){
      const randomIndex = Math.floor(Math.random() * count) + 1;
      return `${folder}/img${randomIndex}.png`;
    }


    // Config de carpetas y cantidad de imágenes por carpeta.
    // Ajustá los números si tu carpeta tiene distinto conteo.
    const IMG_CONFIG = {
      pronouns: { folder: "../imgs/pronouns", count: 6 },
      verbs:    { folder: "../imgs/verbs",    count: 41 },
      yn:       { folder: "../imgs/yn",       count: 2 }
    };

    function updateVerbs(){
      // setea las imágenes de pronoun / verb / yn usando getRandomImage
      document.getElementById("img1").src = getRandomImage(IMG_CONFIG.verbs.folder, IMG_CONFIG.pronouns.count);
      document.getElementById("img2").src = getRandomImage(IMG_CONFIG.verbs.folder, IMG_CONFIG.verbs.count);
      document.getElementById("img3").src = getRandomImage(IMG_CONFIG.verbs.folder, IMG_CONFIG.yn.count);
    }

    /* -------------------------
       Lógica para mostrar personas
       ------------------------- */
    async function displayAll() {
      // limpiar contenedores
      document.getElementById("main-person").innerHTML = "";
      document.getElementById("extra-persons").innerHTML = "";

      // Persona principal
      const person = await generatePerson();
      document.getElementById("main-person").innerHTML = `
        <h2>${person.fullname}</h2>
        <p><b>Age:</b> ${person.age}</p>
        <p><b>Birthday:</b> ${person.birthday}</p>
        <p><b>Height:</b> ${person.heith} m</p>
        <p><b>From:</b> ${person.country} — <b>Lives in:</b> ${person.countryLive}</p>
        <p>
          <img src="../imgs/likes/eye.png" alt="Eye" width="40">
          <div class="eye_circle" style="display:inline-block; vertical-align:middle; background-color: ${person.eyeColor};"></div>
          ${person.eyeColor}
        </p>
        <p>
          <img src="../imgs/likes/hair.png" alt="Hair" width="40">
          <div class="eye_circle" style="display:inline-block; vertical-align:middle; background-color: ${person.hairColor};"></div>
          ${person.hairColor}
        </p>
        <p><b>Occupation:</b> ${person.job}</p>
        <p>
          <img src="../imgs/likes/like.png" alt="Like" width="40">${person.like}
        </p>
        <p>
          <img src="../imgs/likes/dislike.png" alt="Dislike" width="40">${person.dislike}
        </p>
        <p>
          <img src="../imgs/likes/love.png" alt="Love" width="40">${person.love}
        </p>
        <p>
          <img src="../imgs/likes/hate.png" alt="Hate" width="40">${person.hate}
        </p>
        <p><b>Favorites:</b> Song: ${person.favoriteSong}, TV: ${person.favoriteTVShow}, Movie: ${person.favoriteMovie}, Color: ${person.favoriteColor}, Superhero: ${person.favoriteSuperhero}</p>
        <p><b>Foods/Drinks:</b> ${person.foods} / ${person.drinks}</p>
        <p><b>Opinions:</b> ${person.opinions}</p>
        <p><b>Knowledge:</b> ${person.knowledge}</p>
        <p><b>Feelings:</b> ${person.feelings}</p>
        <p><b>Wants/Needs:</b> ${person.wants} / ${person.needs}</p>
        <p><b>Skills:</b> ${person.skills}</p>
        <p>${person.familyMembers}</p>
        ${person.siblings && person.siblings.length ? `<p><b>Siblings:</b> ${person.siblings.map(s => `${s.fullname} (${s.age}, ${s.job})`).join('; ')}</p>` : ''}
      `;

      // Tres personas extra (fila)
      for (let i = 0; i < 3; i++) {
        const extra = await generatePerson();
        const card = document.createElement("div");
        card.classList.add("card");
        card.innerHTML = `
          <h3>${extra.fullname}</h3>
          <p><b>Age:</b> ${extra.age}</p>
          <p><b>Birthday:</b> ${extra.birthday}</p>
          <p><b>From:</b> ${extra.country} — <b>Lives in:</b> ${extra.countryLive}</p>
          <p>
            <img src="../imgs/likes/eye.png" alt="Eye" width="40">
            <div class="eye_circle" style="display:inline-block; vertical-align:middle; background-color: ${extra.eyeColor};"></div>
            ${extra.eyeColor}
          </p>
          <p>
            <img src="../imgs/likes/hair.png" alt="Hair" width="40">
            <div class="eye_circle" style="display:inline-block; vertical-align:middle; background-color: ${extra.hairColor};"></div>
            ${extra.hairColor}
          </p>
          <p><b>Job:</b> ${extra.job}</p>
          <p>
            <img src="../imgs/likes/like.png" alt="Like" width="40">${extra.like}
          </p>
          <p>
            <img src="../imgs/likes/dislike.png" alt="Dislike" width="40">${extra.dislike}
          </p>
          <p>
            <img src="../imgs/likes/love.png" alt="Love" width="40">${extra.love}
          </p>
          <p>
            <img src="../imgs/likes/hate.png" alt="Hate" width="40">${extra.hate}
          </p>
          <p><b>Favorites:</b> ${extra.favoriteSong}, ${extra.favoriteTVShow}, ${extra.favoriteMovie}</p>
        `;
        document.getElementById("extra-persons").appendChild(card);
      }

      // actualizar verbos e imágenes (aquí usamos nuestras funciones locales)
      updateVerbs();
    }

    // Botón generar
    document.getElementById("generar").addEventListener("click", displayAll);

    // Generar al cargar la página
    window.addEventListener("load", displayAll);
  </script>
</body>
</html>
