<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My House</title>
  <link rel="stylesheet" href="../styles/house.css">
</head>
<body>
  <div class="house">
    <table>
      <tr>
        <td colspan="5" class="roof">
          <div class="room" data-room="Roof"></div>
        </td>
      </tr>

      <tr><td colspan="5" class="label">First Story</td></tr>
      <tr>
        <td><div class="room" data-room="Bedroom 1"></div></td>
        <td><div class="room" data-room="Bedroom 2"></div></td>
        <td><div class="room" data-room="Bathroom"></div></td>
        <td><div class="room" data-room="Balcony"></div></td>
        <td><div class="room" data-room="Bedroom 3"></div></td>
      </tr>

      <tr><td colspan="5" class="label">Ground Floor</td></tr>
      <tr>
        <td><div class="room" data-room="Kitchen"></div></td>
        <td><div class="room" data-room="Living Room"></div></td>
        <td><div class="room" data-room="Dining Room"></div></td>
        <td><div class="room" data-room="Garage"></div></td>
        <td><div class="room" data-room="Hall"></div></td>
      </tr>
      <tr>
        <td colspan="5"><div class="room" data-room="Bathroom"></div></td>
      </tr>

      <tr>
        <td colspan="5" class="basement">
          <div class="room" data-room="Basement"></div>
        </td>
      </tr>
    </table>
  </div>

  <script src="../scripts/house.js"></script>
</body>
</html>
